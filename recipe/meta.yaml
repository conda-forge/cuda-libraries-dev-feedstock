{% set version = "13.3.1" %}

package:
  name: cuda-libraries-dev
  version: {{ version }}

source:
  url: https://developer.download.nvidia.com/compute/cuda/redist/cuda_documentation/LICENSE.txt
  sha256: e2c71babfd18a8e69542dd7e9ca018f9caa438094001a58e6bc4d8c999bf0d07

build:
  number: 0
  skip: true  # [osx or ppc64le]

requirements:
  run:
    - cuda-cudart-dev 13.3.29
    - cuda-cccl_{{ target_platform }} 13.3.3.4.1
    - cuda-profiler-api 13.3.27
    - cuda-driver-dev 13.3.29    # [linux]
    - cuda-nvrtc-dev 13.3.33
    - cuda-opencl-dev 13.3.27    # [linux64 or win]
    - libcublas-dev 13.6.0.2
    - libcudla-dev 13.3.29     # [linux and aarch64]
    - libcufft-dev 12.3.0.29
    - libcufile-dev 1.18.1.6       # [linux]
    - libcuobjclient-dev 1.2.0.68  # [linux64 or aarch64]
    - libcurand-dev 10.4.3.29
    - libcusolver-dev 12.2.6.9
    - libcusparse-dev 12.8.2.51
    - libnpp-dev 13.1.2.81
    - libnvfatbin-dev 13.3.29
    - libnvjitlink-dev 13.3.33
    - libnvjpeg-dev 13.2.1.68

test:
  commands:
    - exit 0

about:
  home: https://developer.nvidia.com/cuda-toolkit
  license_file: LICENSE.txt
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_url: https://docs.nvidia.com/cuda/eula/index.html
  summary: Meta-package containing all available library development packages.
  description: |
    Meta-package containing all available library development packages.
  doc_url: https://docs.nvidia.com/cuda/index.html

extra:
  recipe-maintainers:
    - conda-forge/cuda
